name: Deploy Doxygen Documentation to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential curl \
            doxygen graphviz \
            libyaml-dev zlib1g-dev \
            libcurl4-openssl-dev \
            libpq-dev libuv-dev

      - name: Validate Mermaid diagrams
        run: python3 scripts/check_mermaid.py .

      - name: Configure CMake (for clang-assisted parsing)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (to generate compile_commands.json)
        run: cmake --build build -j$(nproc)

      - name: Generate Doxygen Documentation
        run: cmake --build build --target docs

      - name: Verify Mermaid JS was downloaded
        run: |
          if [ ! -f docs/assets/mermaid.min.js ]; then
            echo "ERROR: mermaid.min.js not downloaded — diagrams will not render"
            exit 1
          fi
          ls -lh docs/assets/mermaid.min.js docs/html/mermaid.min.js 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
