name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build-pkg/_deps
        key: ${{ runner.os }}-release-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-release-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ccache
          ~/Library/Caches/ccache
        key: ${{ runner.os }}-release-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-release-ccache-

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang ccache \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake pkg-config llvm libyaml zlib curl openssl libpq sqlite3 ccache

    - name: Build and package (Linux)
      if: runner.os == 'Linux'
      run: |
        ./scripts/package.sh --shared

    - name: Build and package (macOS)
      if: runner.os == 'macOS'
      env:
        CFLAGS: "-Wno-deprecated-declarations"
      run: |
        export LDFLAGS="-L$(brew --prefix openssl)/lib"
        export CSILK_EXTRA_CMAKE_FLAGS="-DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang -DCMAKE_PREFIX_PATH=$(brew --prefix);$(brew --prefix)/opt/openssl;$(brew --prefix)/opt/libyaml;$(brew --prefix)/opt/zlib;$(brew --prefix)/opt/curl;$(brew --prefix)/opt/sqlite3"
        ./scripts/package.sh --shared

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ runner.os }}
        path: build-pkg/csilk-*.tar.gz*
        retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Generate release notes
      id: notes
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        # Extract the matching section from CHANGELOG.md
        NOTES_FILE="/tmp/release-notes.md"
        if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
          awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md \
            | sed '$d' \
            > "$NOTES_FILE"
        else
          echo "## ${GITHUB_REF_NAME}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          echo "See CHANGELOG.md for details." >> "$NOTES_FILE"
        fi
        echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

    - name: List artifacts
      run: |
        ls -lh csilk-*.tar.gz* || echo "(no packages found)"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: ${{ steps.notes.outputs.notes_file }}
        files: |
          csilk-*.tar.gz*
        fail_on_unmatched_files: false
        generate_release_notes: false
