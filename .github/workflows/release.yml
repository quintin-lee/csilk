name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build-pkg/_deps
        key: ${{ runner.os }}-release-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-release-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ccache
          ~/Library/Caches/ccache
        key: ${{ runner.os }}-release-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-release-ccache-

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang ccache \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev libuv1-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake pkg-config llvm libyaml zlib curl openssl libpq sqlite3 ccache libuv

    - name: Set macOS build env
      if: runner.os == 'macOS'
      run: |
        BREW_PREFIX=$(brew --prefix)
        LLVM_PREFIX=$(brew --prefix llvm)
        echo "BREW_PREFIX=${BREW_PREFIX}" >> "$GITHUB_ENV"
        echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
        echo "LDFLAGS=-L${BREW_PREFIX}/opt/openssl/lib" >> "$GITHUB_ENV"
        echo "CSILK_EXTRA_CMAKE_FLAGS=-DCMAKE_C_COMPILER=${LLVM_PREFIX}/bin/clang -DCMAKE_PREFIX_PATH=${BREW_PREFIX};${BREW_PREFIX}/opt/openssl;${BREW_PREFIX}/opt/libyaml;${BREW_PREFIX}/opt/zlib;${BREW_PREFIX}/opt/curl;${BREW_PREFIX}/opt/sqlite3" >> "$GITHUB_ENV"

    - name: Build and package (Linux)
      if: runner.os == 'Linux'
      run: |
        ./scripts/package.sh --shared

    - name: Build and package (macOS)
      if: runner.os == 'macOS'
      run: |
        ./scripts/package.sh --shared

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ runner.os }}
        path: build-pkg/csilk-*.tar.gz*
        retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Download wheel artifacts from Build Wheels workflow
      run: |
        echo "Looking for wheel artifacts..."
        WHEELS_RUN_ID=$(gh run list --workflow wheels.yml --limit 5 --json databaseId --jq '.[0].databaseId')
        echo "Found wheels run ID: $WHEELS_RUN_ID"
        if [ -n "$WHEELS_RUN_ID" ]; then
          mkdir -p wheelhouse
          gh run download "$WHEELS_RUN_ID" --dir wheelhouse || echo "Download failed"
          ls -la wheelhouse/ || echo "wheelhouse empty"
        else
          echo "No wheel artifacts found"
        fi

    - name: Generate release notes
      id: notes
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        # Extract the matching section from CHANGELOG.md
        NOTES_FILE="/tmp/release-notes.md"
        if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
          awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md \
            | sed '$d' \
            > "$NOTES_FILE"
        else
          echo "## ${GITHUB_REF_NAME}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          echo "See CHANGELOG.md for details." >> "$NOTES_FILE"
        fi
        echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

    - name: List artifacts
      run: |
        ls -lh csilk-*.tar.gz* || echo "(no packages found)"
        ls -lh wheelhouse/*.whl || echo "(no wheels found)"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: ${{ steps.notes.outputs.notes_file }}
        files: |
          csilk-*.tar.gz*
          wheelhouse/*.whl
        fail_on_unmatched_files: false
        generate_release_notes: false
