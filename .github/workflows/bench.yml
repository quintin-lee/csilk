name: Performance Benchmark

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake clang \
            libyaml-dev zlib1g-dev libcurl4-openssl-dev \
            libpq-dev libsqlite3-dev wrk python3

      - name: Configure & Build
        run: |
          cmake -B build_release -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build_release --target example_server -j$(nproc)

      - name: Prepare Baseline
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p benchmarks/results
          # Try to get baseline from master branch artifact or cache
          # For simplicity in this implementation, we run on master if not exists
          # (A more robust version would use a dedicated baseline branch or artifact)
          echo "Setting up baseline..."

      - name: Run Benchmarks
        env:
          BENCH_DURATION: 5s
        run: |
          cd build_release
          bash ../benchmarks/run_benchmarks.sh --save

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/latest.json

      - name: Compare (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Fetch master branch for comparison
          git checkout master
          bash benchmarks/run_benchmarks.sh --save
          mv benchmarks/results/latest.json benchmarks/results/baseline.json
          
          # Go back to PR branch
          git checkout ${{ github.event.pull_request.head.sha }}
          # Run comparison
          bash benchmarks/run_benchmarks.sh --compare

      - name: Post Comment (PR only)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'benchmarks/results/comparison.md';
            if (fs.existsSync(path)) {
              const report = fs.readFileSync(path, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }
