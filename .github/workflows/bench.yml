name: Performance Benchmark

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: build_release/_deps
          key: ${{ runner.os }}-bench-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-bench-deps-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake clang \
            libyaml-dev zlib1g-dev libcurl4-openssl-dev \
            libpq-dev libsqlite3-dev libuv1-dev wrk python3

      - name: Setup benchmark toolchain
        run: |
          # Only perf + FlameGraph (wrk already installed above)
          ./scripts/setup_bench_tools.sh --ci

      - name: Configure & Build
        run: |
          cmake -B build_release -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build_release --target example_server -j$(nproc)

      - name: Run Benchmarks
        env:
          BENCH_DURATION: 5s
          BENCH_RUNS: 3
        run: |
          cd build_release
          bash ../scripts/run_benchmarks.sh --save

      - name: Upload Results
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/*.json

      - name: Compare (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Fetch master branch for comparison
          git checkout master
          bash scripts/run_benchmarks.sh --save
          mv benchmarks/results/latest.json benchmarks/results/baseline.json

          # Go back to PR branch
          git checkout ${{ github.event.pull_request.head.sha }}
          # Run comparison
          bash scripts/run_benchmarks.sh --compare

      - name: Post Comment (PR only)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = 'benchmarks/results/comparison.md';
            if (fs.existsSync(path)) {
              const report = fs.readFileSync(path, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

  profile:
    name: CPU Profile (FlameGraph)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: build-profile/_deps
          key: ${{ runner.os }}-profile-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-profile-deps-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake clang \
            libyaml-dev zlib1g-dev libcurl4-openssl-dev \
            libpq-dev libsqlite3-dev libuv1-dev wrk

      - name: Setup benchmark toolchain (perf + FlameGraph)
        run: |
          # perf_event_paranoid may be 4 in GitHub Actions;
          # cap_perfmon is not granted, so perf will use kernel tracepoints only
          ./scripts/setup_bench_tools.sh --ci
          sudo sysctl kernel.perf_event_paranoid=1 2>/dev/null || true

      - name: Profile with perf + FlameGraph
        run: |
          ./scripts/profile.sh \
            --duration 30 \
            --rate 50000 \
            --output profile-output

      - name: Check FlameGraph output
        run: |
          if [[ ! -f profile-output/flamegraph.svg ]]; then
            echo "::warning::No flamegraph.svg produced — perf collected no samples."
            echo "  GitHub Actions runners lack cap_perfmon; perf_event_paranoid likely blocks sampling."
            echo "  FlameGraph upload was skipped. Run profiling on a privileged host for flame graphs."
          else
            echo "[ok] flamegraph.svg present"
          fi

      - name: Upload FlameGraph
        if: ${{ hashFiles('profile-output/flamegraph.svg') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: flamegraph
          path: profile-output/flamegraph.svg
