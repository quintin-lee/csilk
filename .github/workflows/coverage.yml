name: Code Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-coverage-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-coverage-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake build-essential gcc \
          libyaml-dev zlib1g-dev \
          libcurl4-openssl-dev \
          libpq-dev libuv1-dev \
          lcov gcovr

    - name: Configure CMake with coverage
      run: cmake -B build -S . -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Debug -DUSE_COVERAGE=ON -DENABLE_OOM_TEST=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: Generate coverage report
      run: |
        mkdir -p build/coverage
        gcovr -r . build/ --html-details build/coverage/index.html --xml build/coverage/coverage.xml --print-summary --filter src/ --gcov-ignore-parse-errors=negative_hits.warn

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/coverage/
