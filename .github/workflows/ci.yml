name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang clang-tidy libyaml-dev zlib1g-dev libcurl4-openssl-dev libpq-dev
        
    - name: Validate Mermaid diagrams
      run: python3 scripts/check_mermaid.py .
        
    - name: Configure CMake
      run: CC=clang cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DUSE_ASAN=ON -DENABLE_OOM_TEST=ON
      
    - name: Build
      run: cmake --build build -j4
      
    - name: clang-tidy
      run: cmake --build build --target tidy
      
    - name: Test
      run: |
        export ASAN_OPTIONS="detect_leaks=1:symbolize=1:abort_on_error=1"
        cd build && ctest --output-on-failure

  fuzz:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang libyaml-dev zlib1g-dev libcurl4-openssl-dev libpq-dev
        
    - name: Configure CMake
      run: CC=clang cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DUSE_ASAN=ON -DUSE_FUZZER=ON
      
    - name: Build Fuzzer
      run: cmake --build build --target fuzz_test -j4
      
    - name: Run Fuzzer
      run: cd build && ./fuzz_test -max_total_time=10

  benchmark:
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang libyaml-dev zlib1g-dev libcurl4-openssl-dev libpq-dev wrk
        
    - name: Run benchmarks
      run: ./scripts/run_benchmarks.sh --save
