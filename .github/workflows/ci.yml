name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
        build_type: [Debug, Release]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-${{ matrix.build_type }}-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.build_type }}-deps-

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang clang-tidy \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake pkg-config llvm libyaml zlib curl openssl libpq sqlite3

    - name: Configure (Linux)
      if: runner.os == 'Linux'
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_OOM_TEST=ON \
          ${{ matrix.build_type == 'Debug' && '-DUSE_ASAN=ON' || '' }}

    - name: Configure (macOS)
      if: runner.os == 'macOS'
      run: |
        BREW_PREFIX=$(brew --prefix)
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang \
          -DCMAKE_PREFIX_PATH="${BREW_PREFIX};${BREW_PREFIX}/opt/openssl;${BREW_PREFIX}/opt/libyaml;${BREW_PREFIX}/opt/zlib;${BREW_PREFIX}/opt/curl;${BREW_PREFIX}/opt/sqlite3" \
          -DENABLE_OOM_TEST=ON \
          ${{ matrix.build_type == 'Debug' && '-DUSE_ASAN=ON' || '' }}

    - name: Build
      run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

    - name: Run unit tests
      run: ctest --test-dir build -E test_integration --output-on-failure
      env:
        ASAN_OPTIONS: detect_leaks=${{ runner.os == 'Linux' && '1' || '0' }}:symbolize=1:abort_on_error=1
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/.lsan-suppressions

    - name: Run integration tests
      run: ctest --test-dir build -R test_integration --output-on-failure
      env:
        ASAN_OPTIONS: detect_leaks=${{ runner.os == 'Linux' && '1' || '0' }}:symbolize=1:abort_on_error=1
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/.lsan-suppressions

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-lint-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-lint-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang clang-tidy \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev

    - name: Validate Mermaid diagrams
      run: python3 scripts/check_mermaid.py .

    - name: Configure
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug

    - name: clang-tidy
      run: cmake --build build --target tidy || true

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-fuzz-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-fuzz-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang-19 \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev

    - name: Configure
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang-19 -DUSE_ASAN=ON -DUSE_FUZZER=ON

    - name: Build Fuzzer
      run: cmake --build build --target fuzz_test -j$(nproc)

    - name: Run Fuzzer
      run: cd build && ./fuzz_test -max_total_time=10

  io_uring:
    name: io_uring compatibility
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-uring-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-uring-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev

    - name: Configure
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DENABLE_OOM_TEST=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests with io_uring
      run: UV_USE_IO_URING=1 ctest --test-dir build --output-on-failure
      env:
        ASAN_OPTIONS: detect_leaks=1:symbolize=1:abort_on_error=1
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/.lsan-suppressions

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build_bench/_deps
        key: ${{ runner.os }}-bench-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-bench-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev wrk

    - name: Run benchmarks (save)
      run: ./scripts/run_benchmarks.sh --save

    - name: Compare with baseline
      run: ./scripts/run_benchmarks.sh --compare
      continue-on-error: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmarks/results/

  examples:
    name: Examples Smoke Test
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-examples-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-examples-deps-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake clang \
          libyaml-dev zlib1g-dev libcurl4-openssl-dev \
          libpq-dev libsqlite3-dev curl

    - name: Configure
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build examples
      run: cmake --build build --target example_server example_app -j$(nproc)

    - name: Smoke test — example_server
      run: |
        cd build
        ./example_server &
        SERVER_PID=$!
        sleep 2
        curl -fsS http://127.0.0.1:8080/ && echo " PASS" || echo " FAIL"
        kill $SERVER_PID 2>/dev/null || true
        wait $SERVER_PID 2>/dev/null || true
